name: Release Gates

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "release/**"
  push:
    branches:
      - "release/**"
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      LEG: quality
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: "go.sum\ntools/go.sum"
      - name: Prepare trusted persistent test root
        run: |
          set -euo pipefail
          trusted_root="/var/lib/amsftp-tests/$(id -u)"
          sudo install -d -o root -g root -m 0755 /var/lib/amsftp-tests
          sudo install -d -o "$(id -u)" -g "$(id -g)" -m 0700 "${trusted_root}"
          # Keep enough room for runtime/amsftp/control-v1.sock's 100-byte path budget.
          exec_root="$(mktemp -d "${trusted_root}/q.XXXXXX")"
          install -d -m 0700 "${exec_root}"
          printf 'AMSFTP_CI_EXEC_ROOT=%s\n' "${exec_root}" >>"${GITHUB_ENV}"
      - run: make check
        env:
          BUILD_DIR: ${{ runner.temp }}/quality/build
          COVERAGE_DIR: ${{ runner.temp }}/quality/coverage
      - run: make lint
      - run: make fuzz-smoke
      - run: make supply-chain
      - name: Exercise deterministic internal preview packaging and clean-home lifecycle
        run: |
          set -euo pipefail
          input="${RUNNER_TEMP}/internal-preview-input"
          first="${RUNNER_TEMP}/internal-preview-first"
          second="${RUNNER_TEMP}/internal-preview-second"
          install_root="${AMSFTP_CI_EXEC_ROOT}/public-package-install"
          install_prefix="${install_root}/prefix"
          clean_home="${AMSFTP_CI_EXEC_ROOT}/public-package-home"
          old_source="${RUNNER_TEMP}/stage5-source"
          old_binary="${AMSFTP_CI_EXEC_ROOT}/amsftp-stage5"
          old_cache_harness="${AMSFTP_CI_EXEC_ROOT}/pinned-cache-stage5"
          current_cache_harness="${AMSFTP_CI_EXEC_ROOT}/pinned-cache-current"
          failure_harness="${AMSFTP_CI_EXEC_ROOT}/pinned-cache-failure"
          cache_record="${RUNNER_TEMP}/pinned-cache-evidence.json"
          head="$(git rev-parse HEAD)"
          tree="$(git rev-parse 'HEAD^{tree}')"
          source_epoch="$(git show -s --format=%ct HEAD)"
          modules_json="$(tr -d '\n' <docs/release/runtime-dependencies.json)"
          ldflags="-X github.com/TyrantLucifer/awesome-sftp-cli/internal/buildinfo.version=0.1.0-internal -X github.com/TyrantLucifer/awesome-sftp-cli/internal/buildinfo.commit=${head}"
          mkdir -p "${input}/bin"
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="${ldflags}" -o "${input}/bin/${goos}-${goarch}" ./cmd/amsftp
          done
          printf '%s\n' 'Owner-only internal preview; no public distribution license is granted.' >"${input}/LICENSE"
          notice_check="${RUNNER_TEMP}/reviewed-third-party-NOTICE"
          go run ./internal/tools/releasenotice docs/release/runtime-dependencies.json docs/release/license-materials.json >"${notice_check}"
          cmp docs/release/NOTICE "${notice_check}"
          cp docs/release/NOTICE "${input}/NOTICE"
          cp docs/release/INSTALL.md "${input}/INSTALL.md"
          cp docs/release/UNINSTALL.md "${input}/UNINSTALL.md"
          cp docs/release/internal-preview.md "${input}/INTERNAL-PREVIEW.md"
          cp docs/man/amsftp.1 "${input}/amsftp.1"
          "${input}/bin/linux-amd64" completion bash >"${input}/amsftp.bash"
          "${input}/bin/linux-amd64" completion zsh >"${input}/_amsftp"
          "${input}/bin/linux-amd64" completion fish >"${input}/amsftp.fish"
          cat >"${input}/manifest.json" <<EOF
          {
            "schema": "amsftp-internal-preview-manifest-v1",
            "version": "0.1.0-internal",
            "commit": "${head}",
            "tree": "${tree}",
            "source_date_epoch": ${source_epoch},
            "materials": {"license":"LICENSE","notice":"NOTICE","install":"INSTALL.md","uninstall":"UNINSTALL.md","man":"amsftp.1","internal_preview":"INTERNAL-PREVIEW.md","bash_completion":"amsftp.bash","zsh_completion":"_amsftp","fish_completion":"amsftp.fish"},
            "platforms": [
              {"os":"darwin","arch":"amd64","path":"bin/darwin-amd64"},
              {"os":"darwin","arch":"arm64","path":"bin/darwin-arm64"},
              {"os":"linux","arch":"amd64","path":"bin/linux-amd64"},
              {"os":"linux","arch":"arm64","path":"bin/linux-arm64"}
            ],
            "modules": ${modules_json}
          }
          EOF
          go run ./internal/tools/releasepack "${input}/manifest.json" "${first}"
          go run ./internal/tools/releasepack "${input}/manifest.json" "${second}"
          diff -qr "${first}" "${second}"
          test "$(find "${first}" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')" = 7
          (cd "${first}" && sha256sum -c checksums.txt)
          mkdir -p "${install_root}" "${clean_home}/config" "${clean_home}/state" "${clean_home}/cache" "${clean_home}/runtime"
          chmod 0700 "${clean_home}" "${clean_home}/config" "${clean_home}/state" "${clean_home}/cache" "${clean_home}/runtime"
          tar -xzf "${first}/amsftp_0.1.0-internal_linux_amd64.tar.gz" -C "${install_root}"
          extracted="${install_root}/amsftp_0.1.0-internal_linux_amd64"
          installed="${install_prefix}/bin/amsftp"
          mkdir -p \
            "${install_prefix}/bin" \
            "${install_prefix}/share/man/man1" \
            "${install_prefix}/share/bash-completion/completions" \
            "${install_prefix}/share/zsh/site-functions" \
            "${install_prefix}/share/fish/vendor_completions.d"
          install -m 0755 "${extracted}/amsftp" "${installed}"
          install -m 0644 "${extracted}/share/man/man1/amsftp.1" "${install_prefix}/share/man/man1/amsftp.1"
          install -m 0644 "${extracted}/share/bash-completion/completions/amsftp" "${install_prefix}/share/bash-completion/completions/amsftp"
          install -m 0644 "${extracted}/share/zsh/site-functions/_amsftp" "${install_prefix}/share/zsh/site-functions/_amsftp"
          install -m 0644 "${extracted}/share/fish/vendor_completions.d/amsftp.fish" "${install_prefix}/share/fish/vendor_completions.d/amsftp.fish"
          grep -F 'complete -F _amsftp amsftp' "${install_prefix}/share/bash-completion/completions/amsftp"
          grep -F '#compdef amsftp' "${install_prefix}/share/zsh/site-functions/_amsftp"
          grep -F 'complete -c amsftp' "${install_prefix}/share/fish/vendor_completions.d/amsftp.fish"
          version_output="$("${installed}" --version)"
          printf '%s\n' "${version_output}" | grep -F "0.1.0-internal commit=${head} dirty=false"
          version_json="$(tar -xOf "${first}/amsftp_0.1.0-internal_linux_amd64.tar.gz" amsftp_0.1.0-internal_linux_amd64/VERSION.json)"
          printf '%s\n' "${version_json}" | grep -F '"distribution":"internal_preview"'
          printf '%s\n' "${version_json}" | grep -F '"non_redistributable":true'
          printf '%s\n' "${version_json}" | grep -F '"production_helper_closed":true'
          printf '%s\n' "${version_json}" | grep -F '"production_level2_closed":true'
          clean_env=(
            "HOME=${clean_home}"
            "XDG_CONFIG_HOME=${clean_home}/config"
            "XDG_STATE_HOME=${clean_home}/state"
            "XDG_CACHE_HOME=${clean_home}/cache"
            "XDG_RUNTIME_DIR=${clean_home}/runtime"
          )
          for completion_file in \
            "${install_prefix}/share/bash-completion/completions/amsftp" \
            "${install_prefix}/share/zsh/site-functions/_amsftp" \
            "${install_prefix}/share/fish/vendor_completions.d/amsftp.fish"; do
            grep -F 'completion __workspaces' "${completion_file}"
          done
          completion_state="${clean_home}/state/amsftp"
          completion_root="${completion_state}/workspaces"
          test -z "$(env "${clean_env[@]}" "${installed}" completion __workspaces)"
          test ! -e "${completion_root}"
          mkdir -p "${completion_root}"
          chmod 0700 "${completion_state}" "${completion_root}"
          install -m 0600 internal/compatibility/testdata/historical/workspace-v2-stage3.json \
            "${completion_root}/release-smoke.json"
          workspace_completion="$(env "${clean_env[@]}" "${installed}" completion __workspaces)"
          test "${workspace_completion}" = "release-smoke"
          test ! -e "${completion_state}/amsftp.db"
          mkdir -p "${old_source}"
          git archive 312bcccbcbd54246bbe5ff9babf4f14560449176 | tar -x -C "${old_source}"
          mkdir -p "${old_source}/internal/integration"
          cp -R internal/integration/pinned-cache-lifecycle "${old_source}/internal/integration/"
          sed -i 's|github.com/TyrantLucifer/awesome-sftp-cli|github.com/TyrantLucifer/awesome-mac-sftp|g' \
            "${old_source}/internal/integration/pinned-cache-lifecycle/main.go"
          (
            cd "${old_source}"
            # This frozen source predates the repository rename, so -X must match its historical module path.
            CGO_ENABLED=0 go build -buildvcs=false -trimpath \
              -ldflags='-X github.com/TyrantLucifer/awesome-mac-sftp/internal/buildinfo.version=stage5 -X github.com/TyrantLucifer/awesome-mac-sftp/internal/buildinfo.commit=312bcccbcbd54246bbe5ff9babf4f14560449176' \
              -o "${old_binary}" ./cmd/amsftp
            CGO_ENABLED=0 go build -buildvcs=false -trimpath \
              -o "${old_cache_harness}" ./internal/integration/pinned-cache-lifecycle
          )
          CGO_ENABLED=0 go build -buildvcs=false -trimpath \
            -o "${current_cache_harness}" ./internal/integration/pinned-cache-lifecycle
          CGO_ENABLED=0 go build -buildvcs=false -trimpath \
            -o "${failure_harness}" ./internal/integration/pinned-cache-failure
          cleanup_daemon() {
            env "${clean_env[@]}" "${installed}" daemon stop --confirm stop --format json >/dev/null 2>&1 || true
          }
          trap cleanup_daemon EXIT
          env "${clean_env[@]}" "${old_binary}" daemon >"${RUNNER_TEMP}/stage5-daemon.log" 2>&1 &
          old_pid=$!
          old_running=0
          for ((attempt = 0; attempt < 200; attempt++)); do
            env "${clean_env[@]}" "${installed}" daemon status --format json >"${RUNNER_TEMP}/stage5-status.json" 2>/dev/null || true
            if grep -qF '"running":true' "${RUNNER_TEMP}/stage5-status.json"; then
              old_running=1
              break
            fi
            sleep 0.05
          done
          test "${old_running}" = 1
          grep -F 'stage5 commit=312bcccbcbd54246bbe5ff9babf4f14560449176' "${RUNNER_TEMP}/stage5-status.json"
          kill -TERM "${old_pid}"
          wait "${old_pid}"
          state_root="${clean_home}/state/amsftp"
          database="${state_root}/amsftp.db"
          cache_root="${clean_home}/cache/amsftp"
          test -f "${database}"
          test -d "${cache_root}"
          "${old_cache_harness}" seed \
            --database "${database}" --cache-root "${cache_root}" --record "${cache_record}"
          "${old_cache_harness}" verify \
            --database "${database}" --cache-root "${cache_root}" --record "${cache_record}"
          "${current_cache_harness}" verify \
            --database "${database}" --cache-root "${cache_root}" --record "${cache_record}"
          "${failure_harness}" prepare \
            --state-root "${state_root}" --database "${database}" | tee "${RUNNER_TEMP}/failed-upgrade.json"
          grep -F '"original_head":3' "${RUNNER_TEMP}/failed-upgrade.json"
          grep -F '"target_head":4' "${RUNNER_TEMP}/failed-upgrade.json"
          grep -F '"status":"failed"' "${RUNNER_TEMP}/failed-upgrade.json"
          "${current_cache_harness}" verify \
            --database "${database}" --cache-root "${cache_root}" --record "${cache_record}"
          failed_database_before="$(sha256sum "${database}")"
          env "${clean_env[@]}" "${installed}" daemon >"${RUNNER_TEMP}/failed-upgrade-daemon.log" 2>&1 &
          failed_pid=$!
          failed_running=0
          for ((attempt = 0; attempt < 200; attempt++)); do
            env "${clean_env[@]}" "${installed}" daemon status --format json >"${RUNNER_TEMP}/failed-upgrade-status.json" 2>/dev/null || true
            if grep -qF '"running":true' "${RUNNER_TEMP}/failed-upgrade-status.json"; then
              failed_running=1
              break
            fi
            sleep 0.05
          done
          test "${failed_running}" = 1
          set +e
          env "${clean_env[@]}" "${installed}" job list --format json >"${RUNNER_TEMP}/failed-upgrade-jobs.out" 2>"${RUNNER_TEMP}/failed-upgrade-jobs.err"
          failed_job_rc=$?
          set -e
          test "${failed_job_rc}" -ne 0
          grep -F 'durable transfer service is unavailable' "${RUNNER_TEMP}/failed-upgrade-jobs.err"
          kill -TERM "${failed_pid}"
          wait "${failed_pid}"
          failed_database_after="$(sha256sum "${database}")"
          test "${failed_database_before}" = "${failed_database_after}"
          "${current_cache_harness}" verify \
            --database "${database}" --cache-root "${cache_root}" --record "${cache_record}"
          env "${clean_env[@]}" "${installed}" daemon --resume-migration >"${RUNNER_TEMP}/resumed-upgrade-daemon.log" 2>&1 &
          resumed_pid=$!
          resumed_running=0
          for ((attempt = 0; attempt < 200; attempt++)); do
            env "${clean_env[@]}" "${installed}" daemon status --format json >"${RUNNER_TEMP}/resumed-upgrade-status.json" 2>/dev/null || true
            if grep -qF '"running":true' "${RUNNER_TEMP}/resumed-upgrade-status.json"; then
              resumed_running=1
              break
            fi
            sleep 0.05
          done
          test "${resumed_running}" = 1
          grep -F "0.1.0-internal commit=${head}" "${RUNNER_TEMP}/resumed-upgrade-status.json"
          env "${clean_env[@]}" "${installed}" job list --format json | grep -F '"output_version":1'
          kill -TERM "${resumed_pid}"
          wait "${resumed_pid}"
          "${current_cache_harness}" verify \
            --database "${database}" --cache-root "${cache_root}" --record "${cache_record}"
          env "${clean_env[@]}" "${installed}" daemon start --format json | grep -F '"running":true'
          env "${clean_env[@]}" "${installed}" job list --format json | grep -F '"output_version":1'
          env "${clean_env[@]}" "${installed}" daemon status --format json | grep -F '"running":true'
          env "${clean_env[@]}" "${installed}" daemon stop --confirm stop --format json | grep -F '"running":false'
          env "${clean_env[@]}" "${installed}" daemon status --format json | grep -F '"running":false'
          test -f "${database}"
          database_before="$(sha256sum "${database}")"
          env "${clean_env[@]}" "${old_binary}" daemon >"${RUNNER_TEMP}/stage5-rollback.log" 2>&1 &
          old_pid=$!
          old_running=0
          for ((attempt = 0; attempt < 200; attempt++)); do
            env "${clean_env[@]}" "${installed}" daemon status --format json >"${RUNNER_TEMP}/stage5-rollback-status.json" 2>/dev/null || true
            if grep -qF '"running":true' "${RUNNER_TEMP}/stage5-rollback-status.json"; then
              old_running=1
              break
            fi
            sleep 0.05
          done
          test "${old_running}" = 1
          set +e
          env "${clean_env[@]}" "${installed}" job list --format json >"${RUNNER_TEMP}/stage5-jobs.out" 2>"${RUNNER_TEMP}/stage5-jobs.err"
          rollback_job_rc=$?
          set -e
          test "${rollback_job_rc}" -ne 0
          grep -F 'durable transfer service is unavailable' "${RUNNER_TEMP}/stage5-jobs.err"
          kill -TERM "${old_pid}"
          wait "${old_pid}"
          database_after="$(sha256sum "${database}")"
          test "${database_before}" = "${database_after}"
          "${current_cache_harness}" verify \
            --database "${database}" --cache-root "${cache_root}" --record "${cache_record}"
          env "${clean_env[@]}" "${installed}" daemon start --format json | grep -F '"running":true'
          env "${clean_env[@]}" "${installed}" job list --format json | grep -F '"output_version":1'
          env "${clean_env[@]}" "${installed}" daemon stop --confirm stop --format json | grep -F '"running":false'
          "${current_cache_harness}" verify \
            --database "${database}" --cache-root "${cache_root}" --record "${cache_record}"
          trap - EXIT
          rm -f \
            "${installed}" \
            "${install_prefix}/share/man/man1/amsftp.1" \
            "${install_prefix}/share/bash-completion/completions/amsftp" \
            "${install_prefix}/share/zsh/site-functions/_amsftp" \
            "${install_prefix}/share/fish/vendor_completions.d/amsftp.fish"
          rmdir \
            "${install_prefix}/bin" \
            "${install_prefix}/share/man/man1" \
            "${install_prefix}/share/man" \
            "${install_prefix}/share/bash-completion/completions" \
            "${install_prefix}/share/bash-completion" \
            "${install_prefix}/share/zsh/site-functions" \
            "${install_prefix}/share/zsh" \
            "${install_prefix}/share/fish/vendor_completions.d" \
            "${install_prefix}/share/fish" \
            "${install_prefix}/share" \
            "${install_prefix}"
          test ! -e "${installed}"
          test -f "${database}"
          test -d "${extracted}"
      - name: Upload internal preview bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: amsftp-internal-preview-${{ github.sha }}
          path: ${{ runner.temp }}/internal-preview-first
          if-no-files-found: error
      - name: Run real OpenSSH, editor, opener, command, and PTY integration
        env:
          AMSFTP_REAL_SSHD: "1"
        run: |
          set -euo pipefail
          install_stage3_fixtures=0
          for command in sshd nvim vim xdg-open; do
            if ! command -v "${command}" >/dev/null 2>&1; then
              install_stage3_fixtures=1
            fi
          done
          if test "${install_stage3_fixtures}" = 1; then
            sudo apt-get update
            sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y neovim openssh-server vim xdg-utils
          fi
          sudo mkdir -p /run/sshd
          go test -count=1 -run '^(TestRealOpenSSHSFTPHostAliasAndNonDefaultPort|TestStage2TemporarySSHDPTYUploadDownloadMVP|TestStage3NativeEditorsDirectExecMaterialization|TestStage3NativeDefaultOpenerDirectExec|TestStage3TemporarySSHDRemoteShellForegroundPTY)$' ./internal/integration
      - name: Record provenance
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/provenance"
          porcelain="${RUNNER_TEMP}/provenance/${LEG}.porcelain"
          record="${RUNNER_TEMP}/provenance/${LEG}.env"
          : "${RUNNER_OS:?RUNNER_OS is required}"
          : "${RUNNER_ARCH:?RUNNER_ARCH is required}"
          : "${ImageOS:?ImageOS is required}"
          : "${ImageVersion:?ImageVersion is required}"
          go_env_goos="$(go env GOOS)"
          go_env_goarch="$(go env GOARCH)"
          test -n "${go_env_goos}"
          test -n "${go_env_goarch}"
          git status --porcelain=v1 -uall >"${porcelain}"
          {
            printf 'schema=amsftp-provenance-v1\n'
            printf 'workflow=%s\n' "${GITHUB_WORKFLOW}"
            printf 'job=%s\n' "${GITHUB_JOB}"
            printf 'leg=%s\n' "${LEG}"
            printf 'head=%s\n' "$(git rev-parse HEAD)"
            printf 'tree=%s\n' "$(git rev-parse 'HEAD^{tree}')"
            printf 'go_version=%s\n' "$(go version)"
            printf 'runner_os=%s\n' "${RUNNER_OS}"
            printf 'runner_arch=%s\n' "${RUNNER_ARCH}"
            printf 'runner_image_os=%s\n' "${ImageOS}"
            printf 'runner_image_version=%s\n' "${ImageVersion}"
            printf 'go_env_goos=%s\n' "${go_env_goos}"
            printf 'go_env_goarch=%s\n' "${go_env_goarch}"
            if test -s "${porcelain}"; then
              printf 'status=dirty\n'
            else
              printf 'status=clean\n'
            fi
          } >"${record}"
          test ! -s "${porcelain}"
      - name: Upload provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provenance-${{ env.LEG }}
          path: ${{ runner.temp }}/provenance/${{ env.LEG }}.*
          if-no-files-found: error

  auth-integration:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      LEG: auth-integration
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: "go.sum\ntools/go.sum"
      - name: Install isolated authentication fixtures
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y \
            expect \
            krb5-admin-server \
            krb5-kdc \
            krb5-user \
            netcat-openbsd \
            openssh-server \
            proftpd-core \
            proftpd-mod-crypto
      - name: Capture current OpenSSH version
        run: |
          set -euo pipefail
          current_version="$(/usr/bin/ssh -V 2>&1)"
          case "${current_version}" in
            OpenSSH_*) ;;
            *)
              printf 'system ssh did not report an OpenSSH version\n' >&2
              exit 1
              ;;
          esac
          mkdir -p "${RUNNER_TEMP}/auth-integration"
          printf '%s\n' "${current_version}" | tee "${RUNNER_TEMP}/auth-integration/openssh-current-version"
      - name: Capture current MIT Kerberos version
        run: |
          set -euo pipefail
          kerberos_version="$(/usr/bin/klist -V 2>&1)"
          case "${kerberos_version}" in
            Kerberos\ 5\ version\ *) ;;
            *)
              printf 'system klist did not report an MIT Kerberos version\n' >&2
              exit 1
              ;;
          esac
          mkdir -p "${RUNNER_TEMP}/auth-integration"
          printf '%s\n' "${kerberos_version}" | tee "${RUNNER_TEMP}/auth-integration/kerberos-current-version"
      - name: Capture current ProFTPD vendor SFTP version
        run: |
          set -euo pipefail
          proftpd_version="$(/usr/sbin/proftpd -v 2>&1)"
          case "${proftpd_version}" in
            ProFTPD\ Version\ *) ;;
            *)
              printf 'system proftpd did not report a ProFTPD version\n' >&2
              exit 1
              ;;
          esac
          {
            printf '%s\n' "${proftpd_version}"
            # shellcheck disable=SC2016
            dpkg-query -W -f='${Package}=${Version}\n' proftpd-core proftpd-mod-crypto | LC_ALL=C sort
          } | tee "${RUNNER_TEMP}/auth-integration/proftpd-current-version"
      - name: Download internal preview bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: amsftp-internal-preview-${{ github.sha }}
          path: ${{ runner.temp }}/auth-integration/bundle
      - name: Verify and extract internal preview bundle
        run: |
          set -euo pipefail
          bundle="${RUNNER_TEMP}/auth-integration/bundle"
          test "$(find "${bundle}" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d '[:space:]')" = 7
          (cd "${bundle}" && sha256sum -c checksums.txt)
          archive="${bundle}/amsftp_0.1.0-internal_linux_amd64.tar.gz"
          install_root="${RUNNER_TEMP}/auth-integration/install"
          test -f "${archive}"
          test ! -e "${install_root}"
          mkdir -p "${install_root}"
          tar -xzf "${archive}" -C "${install_root}"
          installed="${install_root}/amsftp_0.1.0-internal_linux_amd64/amsftp"
          test -x "${installed}"
          "${installed}" --version | grep -F "0.1.0-internal commit=${GITHUB_SHA} dirty=false"
          tar -xOf "${archive}" amsftp_0.1.0-internal_linux_amd64/VERSION.json | grep -F "\"commit\":\"${GITHUB_SHA}\""
      - name: Run real OpenSSH authentication matrix
        run: |
          set -euo pipefail
          sudo env \
            AMSFTP_AUTH_BINARY="${RUNNER_TEMP}/auth-integration/install/amsftp_0.1.0-internal_linux_amd64/amsftp" \
            AMSFTP_AUTH_EXPECT_OPENSSH_VERSION="$(cat "${RUNNER_TEMP}/auth-integration/openssh-current-version")" \
            AMSFTP_AUTH_ROOT="/tmp/amsftp-auth-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            bash ./internal/integration/hosted-auth.sh
      - name: Run real MIT Kerberos/GSSAPI matrix
        run: |
          set -euo pipefail
          sudo env \
            AMSFTP_KERBEROS_BINARY="${RUNNER_TEMP}/auth-integration/install/amsftp_0.1.0-internal_linux_amd64/amsftp" \
            AMSFTP_KERBEROS_EXPECT_VERSION="$(cat "${RUNNER_TEMP}/auth-integration/kerberos-current-version")" \
            AMSFTP_KERBEROS_ROOT="/tmp/amsftp-kerberos-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            bash ./internal/integration/hosted-kerberos.sh
      - name: Run real ProFTPD vendor SFTP matrix
        run: |
          set -euo pipefail
          AMSFTP_VENDOR_BINARY="${RUNNER_TEMP}/auth-integration/install/amsftp_0.1.0-internal_linux_amd64/amsftp" \
            AMSFTP_VENDOR_SFTP_EXPECT_VERSION_FILE="${RUNNER_TEMP}/auth-integration/proftpd-current-version" \
            AMSFTP_VENDOR_SFTP_ROOT="/tmp/amsftp-vendor-sftp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            bash ./internal/integration/hosted-vendor-sftp.sh
      - name: Record provenance
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/provenance"
          porcelain="${RUNNER_TEMP}/provenance/${LEG}.porcelain"
          record="${RUNNER_TEMP}/provenance/${LEG}.env"
          : "${RUNNER_OS:?RUNNER_OS is required}"
          : "${RUNNER_ARCH:?RUNNER_ARCH is required}"
          : "${ImageOS:?ImageOS is required}"
          : "${ImageVersion:?ImageVersion is required}"
          go_env_goos="$(go env GOOS)"
          go_env_goarch="$(go env GOARCH)"
          test -n "${go_env_goos}"
          test -n "${go_env_goarch}"
          git status --porcelain=v1 -uall >"${porcelain}"
          {
            printf 'schema=amsftp-provenance-v1\n'
            printf 'workflow=%s\n' "${GITHUB_WORKFLOW}"
            printf 'job=%s\n' "${GITHUB_JOB}"
            printf 'leg=%s\n' "${LEG}"
            printf 'head=%s\n' "$(git rev-parse HEAD)"
            printf 'tree=%s\n' "$(git rev-parse 'HEAD^{tree}')"
            printf 'go_version=%s\n' "$(go version)"
            printf 'runner_os=%s\n' "${RUNNER_OS}"
            printf 'runner_arch=%s\n' "${RUNNER_ARCH}"
            printf 'runner_image_os=%s\n' "${ImageOS}"
            printf 'runner_image_version=%s\n' "${ImageVersion}"
            printf 'go_env_goos=%s\n' "${go_env_goos}"
            printf 'go_env_goarch=%s\n' "${go_env_goarch}"
            if test -s "${porcelain}"; then
              printf 'status=dirty\n'
            else
              printf 'status=clean\n'
            fi
          } >"${record}"
          test ! -s "${porcelain}"
      - name: Upload provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provenance-${{ env.LEG }}
          path: ${{ runner.temp }}/provenance/${{ env.LEG }}.*
          if-no-files-found: error

  native:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    env:
      LEG: native-${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: "go.sum\ntools/go.sum"
      - name: Prepare trusted persistent test root
        run: |
          set -euo pipefail
          if test "${RUNNER_OS}" = Linux; then
            trusted_root="/var/lib/amsftp-tests/$(id -u)"
            sudo install -d -o root -g root -m 0755 /var/lib/amsftp-tests
            sudo install -d -o "$(id -u)" -g "$(id -g)" -m 0700 "${trusted_root}"
            exec_root="$(mktemp -d "${trusted_root}/n.XXXXXX")"
          else
            exec_root="$(mktemp -d "${HOME}/.amsftp-ci.XXXXXX")"
          fi
          # Keep enough room for runtime/amsftp[-UID]/control-v1.sock's 100-byte path budget.
          install -d -m 0700 "${exec_root}"
          printf 'AMSFTP_CI_EXEC_ROOT=%s\n' "${exec_root}" >>"${GITHUB_ENV}"
      - run: make fmt-check
      - run: make vet
      - run: make test
        env:
          BUILD_DIR: ${{ runner.temp }}/native/build
          COVERAGE_DIR: ${{ runner.temp }}/native/coverage
      - run: make test-contract
        env:
          BUILD_DIR: ${{ runner.temp }}/native/build
          COVERAGE_DIR: ${{ runner.temp }}/native/coverage
      - run: make test-race
      - run: mkdir -p "${AMSFTP_CI_EXEC_ROOT}/bin"
      - run: go build -trimpath -o "${AMSFTP_CI_EXEC_ROOT}/bin/amsftp" ./cmd/amsftp
      - run: '"${AMSFTP_CI_EXEC_ROOT}/bin/amsftp" --help'
      - run: '"${AMSFTP_CI_EXEC_ROOT}/bin/amsftp" --version'
      - name: Exercise native clean install and uninstall lifecycle
        run: |
          set -euo pipefail
          native_binary="${AMSFTP_CI_EXEC_ROOT}/bin/amsftp"
          install_root="${AMSFTP_CI_EXEC_ROOT}/clean-install"
          prefix="${install_root}/prefix"
          installed="${prefix}/bin/amsftp"
          clean_home="${AMSFTP_CI_EXEC_ROOT}/clean-home"
          test ! -e "${install_root}"
          test ! -e "${clean_home}"
          mkdir -p \
            "${prefix}/bin" \
            "${prefix}/share/man/man1" \
            "${prefix}/share/bash-completion/completions" \
            "${prefix}/share/zsh/site-functions" \
            "${prefix}/share/fish/vendor_completions.d" \
            "${clean_home}/config" \
            "${clean_home}/state" \
            "${clean_home}/cache" \
            "${clean_home}/runtime"
          chmod 0700 "${clean_home}" "${clean_home}/config" "${clean_home}/state" "${clean_home}/cache" "${clean_home}/runtime"
          install -m 0755 "${native_binary}" "${installed}"
          install -m 0644 docs/man/amsftp.1 "${prefix}/share/man/man1/amsftp.1"
          "${installed}" completion bash >"${prefix}/share/bash-completion/completions/amsftp"
          "${installed}" completion zsh >"${prefix}/share/zsh/site-functions/_amsftp"
          "${installed}" completion fish >"${prefix}/share/fish/vendor_completions.d/amsftp.fish"
          test "$("${native_binary}" --version)" = "$("${installed}" --version)"
          clean_env=(
            "HOME=${clean_home}"
            "XDG_CONFIG_HOME=${clean_home}/config"
            "XDG_STATE_HOME=${clean_home}/state"
            "XDG_CACHE_HOME=${clean_home}/cache"
            "XDG_RUNTIME_DIR=${clean_home}/runtime"
            "TMPDIR=${clean_home}/runtime"
          )
          for completion_file in \
            "${prefix}/share/bash-completion/completions/amsftp" \
            "${prefix}/share/zsh/site-functions/_amsftp" \
            "${prefix}/share/fish/vendor_completions.d/amsftp.fish"; do
            grep -F 'completion __workspaces' "${completion_file}"
          done
          if test "${RUNNER_OS}" = Linux; then
            completion_state="${clean_home}/state/amsftp"
          else
            completion_state="${clean_home}/Library/Application Support/io.github.tyrantlucifer.amsftp/state"
          fi
          completion_root="${completion_state}/workspaces"
          test -z "$(env "${clean_env[@]}" "${installed}" completion __workspaces)"
          test ! -e "${completion_root}"
          mkdir -p "${completion_root}"
          if test "${RUNNER_OS}" = Linux; then
            chmod 0700 "${completion_state}" "${completion_root}"
          else
            find "${clean_home}/Library" -type d -exec chmod 0700 {} +
          fi
          install -m 0600 internal/compatibility/testdata/historical/workspace-v2-stage3.json \
            "${completion_root}/release-smoke.json"
          native_workspace_completion="$(env "${clean_env[@]}" "${installed}" completion __workspaces)"
          test "${native_workspace_completion}" = "release-smoke"
          test ! -e "${completion_state}/amsftp.db"
          cleanup_daemon() {
            env "${clean_env[@]}" "${installed}" daemon stop --confirm stop --format json >/dev/null 2>&1 || true
          }
          trap cleanup_daemon EXIT
          env "${clean_env[@]}" "${installed}" daemon start --format json | grep -F '"running":true'
          env "${clean_env[@]}" "${installed}" job list --format json | grep -F '"output_version":1'
          env "${clean_env[@]}" "${installed}" daemon status --format json | grep -F '"running":true'
          doctor_report="${RUNNER_TEMP}/native/doctor.json"
          env "${clean_env[@]}" "${installed}" doctor --format json >"${doctor_report}"
          python3 - "${doctor_report}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as stream:
              report = json.load(stream)
          expected_codes = [
              "config", "runtime_directory", "socket", "daemon", "openssh",
              "known_hosts", "database", "cache", "helper", "disk_space",
          ]
          expected_results = {
              "config": ("pass", "info", "config_defaults"),
              "runtime_directory": ("pass", "info", "runtime_private"),
              "socket": ("pass", "info", "socket_private"),
              "daemon": ("pass", "info", "daemon_reachable"),
              "openssh": ("pass", "info", "openssh_validated"),
              "known_hosts": ("skipped", "info", "endpoint_not_requested"),
              "database": ("warn", "warning", "database_active"),
              "cache": ("pass", "info", "cache_private"),
              "helper": ("pass", "info", "helper_disabled"),
              "disk_space": ("pass", "info", "disk_space_available"),
          }
          assert report["output_version"] == 1
          results = report["results"]
          assert [result["code"] for result in results] == expected_codes
          assert all(result["detail_code"] != "probe_failed" for result in results)
          for result in results:
              status, severity, detail = expected_results[result["code"]]
              assert result == {
                  "code": result["code"],
                  "status": status,
                  "severity": severity,
                  "detail_code": detail,
                  "remediation": "troubleshooting/" + result["code"],
              }
          print("native installed doctor checks passed")
          PY
          env "${clean_env[@]}" "${installed}" daemon stop --confirm stop --format json | grep -F '"running":false'
          env "${clean_env[@]}" "${installed}" daemon status --format json | grep -F '"running":false'
          if test "${RUNNER_OS}" = Linux; then
            database="${clean_home}/state/amsftp/amsftp.db"
          else
            database="${clean_home}/Library/Application Support/io.github.tyrantlucifer.amsftp/state/amsftp.db"
          fi
          test -f "${database}"
          rm -f \
            "${installed}" \
            "${prefix}/share/man/man1/amsftp.1" \
            "${prefix}/share/bash-completion/completions/amsftp" \
            "${prefix}/share/zsh/site-functions/_amsftp" \
            "${prefix}/share/fish/vendor_completions.d/amsftp.fish"
          test ! -e "${installed}"
          test -f "${database}"
          trap - EXIT
      - name: Exercise native installed upgrade, rollback, and stale-socket recovery
        run: |
          set -euo pipefail
          native_binary="${AMSFTP_CI_EXEC_ROOT}/bin/amsftp"
          old_source="${RUNNER_TEMP}/native/stage5-source"
          old_binary="${AMSFTP_CI_EXEC_ROOT}/bin/amsftp-stage5"
          install_root="${AMSFTP_CI_EXEC_ROOT}/upgrade-install"
          prefix="${install_root}/prefix"
          installed="${prefix}/bin/amsftp"
          upgrade_home="${AMSFTP_CI_EXEC_ROOT}/upgrade-home"
          test ! -e "${old_source}"
          test ! -e "${install_root}"
          test ! -e "${upgrade_home}"
          mkdir -p \
            "${old_source}" \
            "${prefix}/bin" \
            "${upgrade_home}/config" \
            "${upgrade_home}/state" \
            "${upgrade_home}/cache" \
            "${upgrade_home}/runtime"
          chmod 0700 \
            "${upgrade_home}" \
            "${upgrade_home}/config" \
            "${upgrade_home}/state" \
            "${upgrade_home}/cache" \
            "${upgrade_home}/runtime"
          if test "${RUNNER_OS}" = Linux; then
            control_socket="${upgrade_home}/runtime/amsftp/control-v1.sock"
          else
            control_socket="${upgrade_home}/runtime/amsftp-$(id -u)/control-v1.sock"
          fi
          test "${#control_socket}" -le 100
          git archive 312bcccbcbd54246bbe5ff9babf4f14560449176 | tar -x -C "${old_source}"
          (
            cd "${old_source}"
            # This frozen source predates the repository rename, so -X must match its historical module path.
            CGO_ENABLED=0 go build -buildvcs=false -trimpath \
              -ldflags='-X github.com/TyrantLucifer/awesome-mac-sftp/internal/buildinfo.version=stage5 -X github.com/TyrantLucifer/awesome-mac-sftp/internal/buildinfo.commit=312bcccbcbd54246bbe5ff9babf4f14560449176' \
              -o "${old_binary}" ./cmd/amsftp
          )
          clean_env=(
            "HOME=${upgrade_home}"
            "XDG_CONFIG_HOME=${upgrade_home}/config"
            "XDG_STATE_HOME=${upgrade_home}/state"
            "XDG_CACHE_HOME=${upgrade_home}/cache"
            "XDG_RUNTIME_DIR=${upgrade_home}/runtime"
            "TMPDIR=${upgrade_home}/runtime"
          )
          install_atomically() {
            source_binary="$1"
            install -m 0755 "${source_binary}" "${installed}.next"
            mv -f "${installed}.next" "${installed}"
          }
          wait_for_running() {
            expected_version="$1"
            for ((attempt = 0; attempt < 200; attempt++)); do
              env "${clean_env[@]}" "${native_binary}" daemon status --format json >"${RUNNER_TEMP}/native/upgrade-status.json" 2>/dev/null || true
              if grep -qF '"running":true' "${RUNNER_TEMP}/native/upgrade-status.json" && \
                 grep -qF "${expected_version}" "${RUNNER_TEMP}/native/upgrade-status.json"; then
                return 0
              fi
              sleep 0.05
            done
            return 1
          }
          daemon_pid=""
          cleanup_upgrade_daemon() {
            env "${clean_env[@]}" "${native_binary}" daemon stop --confirm stop --format json >/dev/null 2>&1 || true
            if test -n "${daemon_pid}" && kill -0 "${daemon_pid}" 2>/dev/null; then
              kill -KILL "${daemon_pid}" 2>/dev/null || true
              wait "${daemon_pid}" 2>/dev/null || true
            fi
          }
          trap cleanup_upgrade_daemon EXIT

          install_atomically "${old_binary}"
          env "${clean_env[@]}" "${installed}" daemon >"${RUNNER_TEMP}/native/stage5-installed-daemon.log" 2>&1 &
          daemon_pid=$!
          wait_for_running 'stage5 commit=312bcccbcbd54246bbe5ff9babf4f14560449176'
          install_atomically "${native_binary}"
          env "${clean_env[@]}" "${installed}" daemon status --format json | grep -F 'stage5 commit=312bcccbcbd54246bbe5ff9babf4f14560449176'
          kill -TERM "${daemon_pid}"
          wait "${daemon_pid}"

          env "${clean_env[@]}" "${installed}" daemon >"${RUNNER_TEMP}/native/current-installed-daemon.log" 2>&1 &
          daemon_pid=$!
          wait_for_running 'commit='
          env "${clean_env[@]}" "${installed}" job list --format json | grep -F '"output_version":1'
          test -S "${control_socket}"
          kill -KILL "${daemon_pid}"
          set +e
          wait "${daemon_pid}"
          killed_rc=$?
          set -e
          test "${killed_rc}" -ne 0
          daemon_pid=""
          test -S "${control_socket}"
          set +e
          env "${clean_env[@]}" "${native_binary}" daemon status --format json >"${RUNNER_TEMP}/native/stale-socket-status.json" 2>/dev/null
          stale_socket_probe_rc=$?
          set -e
          test "${stale_socket_probe_rc}" -ne 0
          env "${clean_env[@]}" "${installed}" daemon >"${RUNNER_TEMP}/native/stale-socket-recovery.log" 2>&1 &
          daemon_pid=$!
          wait_for_running 'commit='
          test -S "${control_socket}"
          env "${clean_env[@]}" "${installed}" daemon stop --confirm stop --format json | grep -F '"running":false'
          wait "${daemon_pid}"

          if test "${RUNNER_OS}" = Linux; then
            database="${upgrade_home}/state/amsftp/amsftp.db"
          else
            database="${upgrade_home}/Library/Application Support/io.github.tyrantlucifer.amsftp/state/amsftp.db"
          fi
          test -f "${database}"
          install_atomically "${old_binary}"
          database_before="$(python3 - "${database}" <<'PY'
          import hashlib
          import sys
          with open(sys.argv[1], "rb") as stream:
              print(hashlib.sha256(stream.read()).hexdigest())
          PY
          )"
          env "${clean_env[@]}" "${installed}" daemon >"${RUNNER_TEMP}/native/stage5-rollback-daemon.log" 2>&1 &
          daemon_pid=$!
          wait_for_running 'stage5 commit=312bcccbcbd54246bbe5ff9babf4f14560449176'
          set +e
          env "${clean_env[@]}" "${native_binary}" job list --format json >"${RUNNER_TEMP}/native/stage5-rollback-job.out" 2>"${RUNNER_TEMP}/native/stage5-rollback-job.err"
          rollback_rc=$?
          set -e
          test "${rollback_rc}" -ne 0
          grep -F 'durable transfer service is unavailable' "${RUNNER_TEMP}/native/stage5-rollback-job.err"
          kill -TERM "${daemon_pid}"
          wait "${daemon_pid}"
          database_after="$(python3 - "${database}" <<'PY'
          import hashlib
          import sys
          with open(sys.argv[1], "rb") as stream:
              print(hashlib.sha256(stream.read()).hexdigest())
          PY
          )"
          test "${database_before}" = "${database_after}"

          install_atomically "${native_binary}"
          env "${clean_env[@]}" "${installed}" daemon >"${RUNNER_TEMP}/native/current-restored-daemon.log" 2>&1 &
          daemon_pid=$!
          wait_for_running 'commit='
          env "${clean_env[@]}" "${installed}" job list --format json | grep -F '"output_version":1'
          env "${clean_env[@]}" "${installed}" daemon stop --confirm stop --format json | grep -F '"running":false'
          wait "${daemon_pid}"
          daemon_pid=""
          trap - EXIT
      - name: Run OpenSSH 8.9p1 compatibility floor
        if: matrix.os == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y expect netcat-openbsd openssh-server
          floor_version="$(/usr/bin/ssh -V 2>&1)"
          case "${floor_version}" in
            OpenSSH_8.9p1\ *) ;;
            *)
              printf 'Ubuntu 22.04 OpenSSH floor drifted from 8.9p1\n' >&2
              exit 1
              ;;
          esac
          printf '%s\n' "${floor_version}" | tee "${RUNNER_TEMP}/native/openssh-floor-version"
          sudo env \
            AMSFTP_AUTH_BINARY="${AMSFTP_CI_EXEC_ROOT}/bin/amsftp" \
            AMSFTP_AUTH_EXPECT_OPENSSH_VERSION="${floor_version}" \
            AMSFTP_AUTH_ROOT="/tmp/amsftp-auth-floor-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            bash ./internal/integration/hosted-auth.sh
      - name: Exercise loopback Homebrew tap lifecycle
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          preview_root="${RUNNER_TEMP}/homebrew-preview"
          old_input="${preview_root}/input-0.9.0"
          new_input="${preview_root}/input-1.0.0"
          old_bundle="${preview_root}/bundle-0.9.0"
          new_bundle="${preview_root}/bundle-1.0.0"
          asset_root="${preview_root}/assets"
          tap_remote="${preview_root}/homebrew-preview-tap"
          port_file="${preview_root}/asset-port"
          server_log="${preview_root}/asset-server.log"
          preview_license="BSD-3-Clause"
          printf '%s\n' 'CI-only Homebrew preview license; this is not the project license.'
          head="$(git rev-parse HEAD)"
          tree="$(git rev-parse 'HEAD^{tree}')"
          source_epoch="$(git show -s --format=%ct HEAD)"
          modules_json="$(tr -d '\n' <docs/release/runtime-dependencies.json)"
          mkdir -p "${preview_root}" "${asset_root}"
          build_preview_bundle() {
            version="$1"
            input="$2"
            output="$3"
            ldflags="-X github.com/TyrantLucifer/awesome-sftp-cli/internal/buildinfo.version=${version} -X github.com/TyrantLucifer/awesome-sftp-cli/internal/buildinfo.commit=${head}"
            mkdir -p "${input}/bin"
            for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
              goos="${target%/*}"
              goarch="${target#*/}"
              CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
                go build -trimpath -ldflags="${ldflags}" -o "${input}/bin/${goos}-${goarch}" ./cmd/amsftp
            done
            printf '%s\n' 'CI-only public packaging contract material; this is not the project license.' >"${input}/LICENSE"
            cp docs/release/NOTICE "${input}/NOTICE"
            cp docs/release/INSTALL.md "${input}/INSTALL.md"
            cp docs/release/UNINSTALL.md "${input}/UNINSTALL.md"
            cp docs/man/amsftp.1 "${input}/amsftp.1"
            cat >"${input}/manifest.json" <<EOF
          {
            "schema": "amsftp-public-release-manifest-v1",
            "version": "${version}",
            "commit": "${head}",
            "tree": "${tree}",
            "source_date_epoch": ${source_epoch},
            "materials": {"license":"LICENSE","notice":"NOTICE","install":"INSTALL.md","uninstall":"UNINSTALL.md","man":"amsftp.1"},
            "platforms": [
              {"os":"darwin","arch":"amd64","path":"bin/darwin-amd64"},
              {"os":"darwin","arch":"arm64","path":"bin/darwin-arm64"},
              {"os":"linux","arch":"amd64","path":"bin/linux-amd64"},
              {"os":"linux","arch":"arm64","path":"bin/linux-arm64"}
            ],
            "modules": ${modules_json}
          }
          EOF
            go run ./internal/tools/releasepack "${input}/manifest.json" "${output}"
            cp "${output}"/*.tar.gz "${asset_root}/"
          }
          build_preview_bundle 0.9.0 "${old_input}" "${old_bundle}"
          build_preview_bundle 1.0.0 "${new_input}" "${new_bundle}"
          go run ./internal/tools/homebrewpreview --serve "${asset_root}" "${port_file}" >"${server_log}" 2>&1 &
          server_pid=$!
          cleanup_homebrew_preview() {
            brew uninstall --force amsftp-ci/preview/amsftp >/dev/null 2>&1 || true
            brew untap amsftp-ci/preview >/dev/null 2>&1 || true
            kill "${server_pid}" >/dev/null 2>&1 || true
            wait "${server_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup_homebrew_preview EXIT
          for ((attempt = 0; attempt < 100; attempt++)); do
            test -s "${port_file}" && break
            sleep 0.05
          done
          if ! test -s "${port_file}"; then
            cat "${server_log}" >&2
            exit 1
          fi
          asset_port="$(cat "${port_file}")"
          asset_origin="http://127.0.0.1:${asset_port}"
          mkdir -p "${tap_remote}/Formula"
          go run ./internal/tools/homebrewpreview 0.9.0 "${preview_license}" "${old_bundle}" "${asset_origin}" >"${tap_remote}/Formula/amsftp.rb"
          git -C "${tap_remote}" init -b main
          git -C "${tap_remote}" config user.name 'AMSFTP CI'
          git -C "${tap_remote}" config user.email 'ci@invalid.example'
          git -C "${tap_remote}" add Formula/amsftp.rb
          git -C "${tap_remote}" commit -m 'amsftp 0.9.0 preview'
          brew tap amsftp-ci/preview "file://${tap_remote}"
          brew trust amsftp-ci/preview
          HOMEBREW_NO_AUTO_UPDATE=1 brew install --build-from-source amsftp-ci/preview/amsftp
          test -L "$(brew --prefix)/bin/amsftp"
          "$(brew --prefix)/bin/amsftp" --version | grep -F "0.9.0 commit=${head} dirty=false"
          "$(brew --prefix)/bin/amsftp" daemon start --format json >/dev/null
          "$(brew --prefix)/bin/amsftp" daemon status --format json | grep -F '"running":true'
          "$(brew --prefix)/bin/amsftp" daemon stop --confirm stop --format json >/dev/null
          go run ./internal/tools/homebrewpreview 1.0.0 "${preview_license}" "${new_bundle}" "${asset_origin}" >"${tap_remote}/Formula/amsftp.rb"
          git -C "${tap_remote}" add Formula/amsftp.rb
          git -C "${tap_remote}" commit -m 'amsftp 1.0.0 preview'
          brew update
          HOMEBREW_NO_AUTO_UPDATE=1 brew upgrade amsftp-ci/preview/amsftp
          "$(brew --prefix)/bin/amsftp" --version | grep -F "1.0.0 commit=${head} dirty=false"
          brew test amsftp-ci/preview/amsftp
          brew uninstall --force amsftp-ci/preview/amsftp
          test ! -e "$(brew --prefix)/bin/amsftp"
          test ! -d "$(brew --cellar)/amsftp"
          brew untap amsftp-ci/preview
          kill "${server_pid}"
          wait "${server_pid}" || test "$?" -eq 143
          trap - EXIT
      - name: Run native ext4 and XFS state durability fixtures
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          trusted_root="/var/lib/amsftp-tests/$(id -u)"
          test "$(findmnt -n -o FSTYPE -T "${trusted_root}")" = ext4
          if ! command -v mkfs.xfs >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xfsprogs
          fi
          xfs_image="${RUNNER_TEMP}/amsftp-state.xfs"
          xfs_root="/mnt/amsftp-state-xfs-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          truncate -s 512M "${xfs_image}"
          sudo mkfs.xfs -f -q "${xfs_image}"
          sudo install -d -o root -g root -m 0700 "${xfs_root}"
          sudo mount -o loop,nosuid,nodev,noexec "${xfs_image}" "${xfs_root}"
          cleanup_xfs() {
            sudo umount "${xfs_root}"
            sudo rmdir "${xfs_root}"
          }
          trap cleanup_xfs EXIT
          sudo chown "$(id -u):$(id -g)" "${xfs_root}"
          chmod 0700 "${xfs_root}"
          test "$(findmnt -n -o FSTYPE -T "${xfs_root}")" = xfs
          AMSFTP_TEST_PERSISTENT_ROOT="${xfs_root}" \
            go test -count=1 ./internal/state/... ./internal/statefs
          AMSFTP_NATIVE_DISK_FULL_ROOT="${xfs_root}" \
            go test -count=1 -run '^TestNativeXFSDiskFullRollsBackWithoutFalseCommit$' ./internal/statefs
      - name: Run native platform kernel security fixtures
        run: |
          set -euo pipefail
          platform_test="${RUNNER_TEMP}/native-platform.test"
          go test -c -o "${platform_test}" ./internal/platform
          "${platform_test}" -test.v -test.run '^(Test(Darwin|Linux)KernelACL.*|TestAcquireInstanceLockIsExclusiveAcrossProcesses)$'
          sudo env \
            AMSFTP_HOSTILE_UID="$(id -u)" \
            AMSFTP_HOSTILE_GID="$(id -g)" \
            "${platform_test}" -test.v -test.run '^TestControlSocketRejectsOtherUIDPeer$'
      - name: Run native PTY resize and recovery smoke
        run: python3 ./internal/integration/hosted-pty.py "${AMSFTP_CI_EXEC_ROOT}/bin/amsftp"
      - name: Record provenance
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/provenance"
          porcelain="${RUNNER_TEMP}/provenance/${LEG}.porcelain"
          record="${RUNNER_TEMP}/provenance/${LEG}.env"
          : "${RUNNER_OS:?RUNNER_OS is required}"
          : "${RUNNER_ARCH:?RUNNER_ARCH is required}"
          : "${ImageOS:?ImageOS is required}"
          : "${ImageVersion:?ImageVersion is required}"
          go_env_goos="$(go env GOOS)"
          go_env_goarch="$(go env GOARCH)"
          test -n "${go_env_goos}"
          test -n "${go_env_goarch}"
          git status --porcelain=v1 -uall >"${porcelain}"
          {
            printf 'schema=amsftp-provenance-v1\n'
            printf 'workflow=%s\n' "${GITHUB_WORKFLOW}"
            printf 'job=%s\n' "${GITHUB_JOB}"
            printf 'leg=%s\n' "${LEG}"
            printf 'head=%s\n' "$(git rev-parse HEAD)"
            printf 'tree=%s\n' "$(git rev-parse 'HEAD^{tree}')"
            printf 'go_version=%s\n' "$(go version)"
            printf 'runner_os=%s\n' "${RUNNER_OS}"
            printf 'runner_arch=%s\n' "${RUNNER_ARCH}"
            printf 'runner_image_os=%s\n' "${ImageOS}"
            printf 'runner_image_version=%s\n' "${ImageVersion}"
            printf 'go_env_goos=%s\n' "${go_env_goos}"
            printf 'go_env_goarch=%s\n' "${go_env_goarch}"
            if test -s "${porcelain}"; then
              printf 'status=dirty\n'
            else
              printf 'status=clean\n'
            fi
          } >"${record}"
          test ! -s "${porcelain}"
      - name: Upload provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provenance-${{ env.LEG }}
          path: ${{ runner.temp }}/provenance/${{ env.LEG }}.*
          if-no-files-found: error


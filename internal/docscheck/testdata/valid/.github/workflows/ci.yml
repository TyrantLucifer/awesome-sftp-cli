name: ci
on:
  pull_request:
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "go.sum\ntools/go.sum"
      - run: make check
        env:
          BUILD_DIR: ${{ runner.temp }}/quality/build
          COVERAGE_DIR: ${{ runner.temp }}/quality/coverage
      - run: make lint
      - run: make fuzz-smoke
      - run: make supply-chain
  native:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-24.04-arm, macos-15, macos-15-intel]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "go.sum\ntools/go.sum"
      - run: make fmt-check
      - run: make vet
      - run: make test
        env:
          BUILD_DIR: ${{ runner.temp }}/native/build
          COVERAGE_DIR: ${{ runner.temp }}/native/coverage
      - run: make test-contract
        env:
          BUILD_DIR: ${{ runner.temp }}/native/build
          COVERAGE_DIR: ${{ runner.temp }}/native/coverage
      - run: make test-race
      - run: mkdir -p "${{ runner.temp }}/native/bin"
      - run: go build -trimpath -o "${{ runner.temp }}/native/bin/amsftp" ./cmd/amsftp
      - run: '"${{ runner.temp }}/native/bin/amsftp" --help'
      - run: '"${{ runner.temp }}/native/bin/amsftp" --version'
      - name: Exercise native clean install and uninstall lifecycle
        run: |
          set -euo pipefail; native_binary="${RUNNER_TEMP}/native/bin/amsftp"; install_root="${RUNNER_TEMP}/native/install"; prefix="${install_root}/prefix"; installed="${prefix}/bin/amsftp"; trusted_root="/var/lib/amsftp-tests/$(id -u)"; trusted_root="${HOME}/.amsftp-native-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"; clean_home="${trusted_root}/clean-home"; test ! -e "${install_root}"; test ! -e "${clean_home}"; mkdir -p "${prefix}/bin" "${prefix}/share/man/man1" "${prefix}/share/bash-completion/completions" "${prefix}/share/zsh/site-functions" "${prefix}/share/fish/vendor_completions.d" "${clean_home}/config" "${clean_home}/state" "${clean_home}/cache" "${clean_home}/runtime"; chmod 0700 "${clean_home}" "${clean_home}/config" "${clean_home}/state" "${clean_home}/cache" "${clean_home}/runtime"; install -m 0755 "${native_binary}" "${installed}"; install -m 0644 docs/man/amsftp.1 "${prefix}/share/man/man1/amsftp.1"; "${installed}" completion bash >"${prefix}/share/bash-completion/completions/amsftp"; "${installed}" completion zsh >"${prefix}/share/zsh/site-functions/_amsftp"; "${installed}" completion fish >"${prefix}/share/fish/vendor_completions.d/amsftp.fish"; test "$("${native_binary}" --version)" = "$("${installed}" --version)"; clean_env=("HOME=${clean_home}" "XDG_CONFIG_HOME=${clean_home}/config" "XDG_STATE_HOME=${clean_home}/state" "XDG_CACHE_HOME=${clean_home}/cache" "XDG_RUNTIME_DIR=${clean_home}/runtime" "TMPDIR=${clean_home}/runtime"); grep -F 'completion __workspaces' "${completion_file}"; completion_state="${clean_home}/state/amsftp"; completion_state="${clean_home}/Library/Application Support/io.github.tyrantlucifer.amsftp/state"; completion_root="${completion_state}/workspaces"; test -z "$(env "${clean_env[@]}" "${installed}" completion __workspaces)"; test ! -e "${completion_root}"; install -m 0600 internal/compatibility/testdata/historical/workspace-v2-stage3.json "${completion_root}/release-smoke.json"; native_workspace_completion="$(env "${clean_env[@]}" "${installed}" completion __workspaces)"; test "${native_workspace_completion}" = "release-smoke"; test ! -e "${completion_state}/amsftp.db"; trap cleanup_daemon EXIT; env "${clean_env[@]}" "${installed}" daemon start --format json | grep -F '"running":true'; env "${clean_env[@]}" "${installed}" job list --format json | grep -F '"output_version":1'; env "${clean_env[@]}" "${installed}" daemon status --format json | grep -F '"running":true'; doctor_report="${RUNNER_TEMP}/native/doctor.json"; env "${clean_env[@]}" "${installed}" doctor --format json >"${doctor_report}"; python3 -c 'expected_codes = ["config", "runtime_directory", "socket", "daemon", "openssh", "known_hosts", "database", "cache", "helper", "disk_space",]; expected_results = {"known_hosts": ("skipped", "info", "endpoint_not_requested"), "database": ("warn", "warning", "database_active")}; report={"output_version": 1, "results": []}; results=report["results"]; assert report["output_version"] == 1; assert [result["code"] for result in results] == expected_codes; assert all(result["detail_code"] != "probe_failed" for result in results); expected={"remediation": "troubleshooting/" + result["code"]}; print("native installed doctor checks passed")'; env "${clean_env[@]}" "${installed}" daemon stop --confirm stop --format json | grep -F '"running":false'; env "${clean_env[@]}" "${installed}" daemon status --format json | grep -F '"running":false'; database="${clean_home}/state/amsftp/amsftp.db"; database="${clean_home}/Library/Application Support/io.github.tyrantlucifer.amsftp/state/amsftp.db"; test -f "${database}"; rm -f "${installed}" "${prefix}/share/man/man1/amsftp.1" "${prefix}/share/bash-completion/completions/amsftp" "${prefix}/share/zsh/site-functions/_amsftp" "${prefix}/share/fish/vendor_completions.d/amsftp.fish"; test ! -e "${installed}"; test -f "${database}"; trap - EXIT; if test "${RUNNER_OS}" = macOS; then preview_license="BSD-3-Clause"; printf '%s\n' 'CI-only Homebrew preview license; this is not the project license.'; go run ./internal/tools/homebrewpreview --serve "${asset_root}" "${port_file}"; asset_origin="http://127.0.0.1:${asset_port}"; go run ./internal/tools/homebrewpreview 0.9.0 "${preview_license}" old "${asset_origin}"; brew tap amsftp-ci/preview; brew install --build-from-source amsftp-ci/preview/amsftp; printf '0.9.0 commit='; go run ./internal/tools/homebrewpreview 1.0.0 "${preview_license}" new "${asset_origin}"; brew update; brew upgrade amsftp-ci/preview/amsftp; printf '1.0.0 commit='; brew uninstall --force amsftp-ci/preview/amsftp; test ! -d "$(brew --cellar)/amsftp"; brew untap amsftp-ci/preview; kill "${server_pid}"; wait "${server_pid}" || test "$?" -eq 143; fi
  oldstable:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      GOTOOLCHAIN: local
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15, macos-15-intel]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.25.12
          cache: true
          cache-dependency-path: "go.sum\ntools/go.sum"
      - run: make check
        env:
          BUILD_DIR: ${{ runner.temp }}/oldstable/build
          COVERAGE_DIR: ${{ runner.temp }}/oldstable/coverage
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: amsftp-darwin-arm64
          - goos: darwin
            goarch: amd64
            artifact: amsftp-darwin-amd64
          - goos: linux
            goarch: arm64
            artifact: amsftp-linux-arm64
          - goos: linux
            goarch: amd64
            artifact: amsftp-linux-amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "go.sum\ntools/go.sum"
      - run: mkdir -p "${{ runner.temp }}/build/${{ matrix.artifact }}"
      - run: go build -trimpath -buildvcs=false -o "${{ runner.temp }}/build/${{ matrix.artifact }}/${{ matrix.artifact }}" ./cmd/amsftp
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

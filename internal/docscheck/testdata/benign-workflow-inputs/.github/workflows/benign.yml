name: benign action inputs
on:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: example/action@0123456789abcdef0123456789abcdef01234567
        with:
          permissions: write-all
          on: pull_request_target
          uses: actions/checkout@v7
          persist-credentials: true
      - uses: example/action@0123456789abcdef0123456789abcdef01234567
        with: {permissions: write-all, on: pull_request_target, uses: actions/checkout@v7, persist-credentials: true}
